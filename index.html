<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM OMAR - PRO SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --blue: #00acee; --bg: #050505; --panel: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 20px; }
        .logo-text { font-size: 2.5rem; font-weight: 900; color: var(--gold); }
        .control-panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 25px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
        .field label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .field input { width: 90%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; text-align: center; }
        .main-btn { grid-column: 1 / -1; padding: 15px; background: var(--blue); color: #fff; font-weight: 900; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; }
        .stats-row { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: var(--panel); padding: 20px; border-radius: 12px; flex: 1; text-align: center; border-bottom: 4px solid var(--blue); min-width: 170px; }
        .stat-card h4 { font-size: 0.75rem; color: #aaa; margin: 0; }
        .stat-card p { font-size: 1.2rem; font-weight: 900; color: var(--gold); margin: 8px 0 0 0; }
        .table-wrapper { position: relative; background: var(--panel); border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .vip-table { width: 100%; border-collapse: collapse; z-index: 1; position: relative; }
        .vip-table th { background: #1a1a1a; color: var(--gold); padding: 12px; }
        .vip-table td { padding: 10px; border-bottom: 1px solid #222; text-align: center; font-size: 0.85rem; }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg); font-size: 8vw; font-weight: 900; color: rgba(255, 204, 0, 0.03); pointer-events: none; z-index: 0; }
        .day-label { background: #222 !important; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">TEAM OMAR 👑</div>
        <p>نظام الحسابات الذكي - مضاعفة رأس المال وحجم التداول</p>
    </div>

    <div class="control-panel">
        <div class="input-grid">
            <div class="field"><label>رأس المال ($)</label><input type="number" id="deposit" value="500"></div>
            <div class="field"><label>المكافأة ($)</label><input type="number" id="bonus" value="20"></div>
            <div class="field"><label>الدخول (%)</label><input type="number" id="risk" value="1"></div>
            <div class="field"><label>أقل ربح (%)</label><input type="number" id="pMin" value="50"></div>
            <div class="field"><label>أقصى ربح (%)</label><input type="number" id="pMax" value="55"></div>
            <div class="field"><label>الحجم المطلوب</label><input type="number" id="vTarget" value="520"></div>
            <div class="field"><label>إشارات أساسية</label><input type="number" id="baseSigs" value="3"></div>
            <div class="field"><label>أيام الإضافي</label><input type="number" id="extraDays" value="2"></div>
            <div class="field"><label>إشارات الإضافي</label><input type="number" id="extraSigs" value="1"></div>
            <button class="main-btn" onclick="runCalculations()">توليد الخطة الاستثمارية</button>
        </div>
    </div>

    <div id="statsRow" class="stats-row"></div>

    <div class="table-wrapper">
        <div class="watermark">TEAM OMAR</div>
        <table class="vip-table">
            <thead>
                <tr>
                    <th>اليوم / الإشارة</th><th>الرصيد قبل</th><th>المبلغ</th><th>الربح</th><th>الرصيد بعد</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        function runCalculations() {
            const deposit = parseFloat(document.getElementById('deposit').value) || 0;
            const bonus = parseFloat(document.getElementById('bonus').value) || 0;
            const risk = (parseFloat(document.getElementById('risk').value) || 0) / 100;
            const pMin = (parseFloat(document.getElementById('pMin').value) || 0) / 100;
            const pMax = (parseFloat(document.getElementById('pMax').value) || 0) / 100;
            const vTarget = parseFloat(document.getElementById('vTarget').value) || 0;
            const baseSigs = parseInt(document.getElementById('baseSigs').value) || 0;
            const extraDays = parseInt(document.getElementById('extraDays').value) || 0;
            const extraSigs = parseInt(document.getElementById('extraSigs').value) || 0;

            let balance = deposit + bonus;
            let startBalance = balance;
            let totalVol = 0;
            let day = 1;
            let doubleDay = null;
            let volDay = null;
            
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            while (day <= 45) {
                let currentDaySigs = baseSigs + (day <= extraDays ? extraSigs : 0);
                body.innerHTML += `<tr class="day-label"><td colspan="5">اليوم رقم ${day}</td></tr>`;

                for (let s = 1; s <= currentDaySigs; s++) {
                    let before = balance;
                    let trade = balance * risk;
                    let profit = trade * (Math.random() * (pMax - pMin) + pMin);
                    
                    balance += profit;
                    totalVol += trade;

                    if (balance >= startBalance * 2 && doubleDay === null) doubleDay = day;
                    if (totalVol >= vTarget && volDay === null) volDay = day;

                    body.innerHTML += `<tr><td>إشارة ${s}</td><td>$${before.toFixed(2)}</td><td>$${trade.toFixed(2)}</td><td style="color:#2ecc71;">+$${profit.toFixed(2)}</td><td>$${balance.toFixed(2)}</td></tr>`;
                }
                day++;
            }

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-card"><h4>مضاعفة رأس المال خلال</h4><p>${doubleDay ? doubleDay + ' يوم' : 'قيد الحساب'}</p></div>
                <div class="stat-card"><h4>إنهاء حجم التداول</h4><p>${volDay ? 'يوم ' + volDay : 'لم يكتمل'}</p></div>
                <div class="stat-card"><h4>إجمالي الحجم المحقق</h4><p>$${totalVol.toFixed(2)}</p></div>
                <div class="stat-card"><h4>الرصيد النهائي</h4><p>$${balance.toFixed(2)}</p></div>`;
        }
    </script>
</body>
</html>
